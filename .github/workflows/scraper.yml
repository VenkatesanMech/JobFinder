name: Career Scraper Bot

on:
  schedule:
    - cron: '30 2 * * 1-5'   # 8:00 AM IST  Mon-Fri
    - cron: '30 7 * * 1-5'   # 1:00 PM IST  Mon-Fri
  workflow_dispatch:           # Manual trigger anytime

jobs:
  scrape-and-alert:
    name: Scrape Career Pages & Email Results
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python Dependencies
        run: pip install -r requirements.txt

      - name: 🎭 Install Playwright + Chrome
        run: playwright install chromium --with-deps

      - name: 🤖 Run Career Scraper Bot
        env:
          FROM_EMAIL:          ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:            ${{ secrets.TO_EMAIL }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: ✅ Done
        if: success()
        run: echo "Scraper completed successfully at $(date)"
