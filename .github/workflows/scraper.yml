name: Career Scraper Bot

on:
  schedule:
    - cron: '30 2 * * 1-5'   # 8:00 AM IST  Mon-Fri
    - cron: '30 7 * * 1-5'   # 1:00 PM IST  Mon-Fri
  workflow_dispatch:           # Manual trigger anytime

jobs:
  scrape-and-alert:
    name: Scrape Career Pages & Email Results
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Fix Ubuntu System Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            libatspi2.0-0

      - name: 📦 Install Python Packages
        run: pip install playwright==1.42.0

      - name: 🎭 Install Playwright Chromium Only
        run: playwright install chromium

      - name: 🤖 Run Career Scraper Bot
        env:
          FROM_EMAIL:          ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:            ${{ secrets.TO_EMAIL }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: ✅ Done
        if: success()
        run: echo "Scraper completed at $(date)"

      - name: ❌ Show Error
        if: failure()
        run: echo "Bot failed — check logs above for details"
